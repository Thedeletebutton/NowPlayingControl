<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Now Playing Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Open+Sans:wght@300;400;500;600;700;800&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#000; --panel:#111; --border:#333; --accent:#2f81ff; --red:#ff3b3b; --text:#fff; --text-muted:#888; --row-height: 35px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Helvetica Neue', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Header Bar - Draggable */
    .header-bar {
      -webkit-app-region: drag;
      height: var(--row-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header-title .accent { color: var(--red); }
    .header-buttons {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
      border-left: 2px solid var(--border);
      padding-left: 10px;
      height: 100%;
    }

    /* Grid Rows */
    .grid-row {
      display: flex;
      align-items: center;
      height: var(--row-height);
      border-bottom: 2px solid var(--border);
      padding: 0 10px;
      gap: 10px;
    }
    .grid-row.section-header {
      justify-content: space-between;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      border-left: 2px solid var(--border);
      padding-left: 10px;
      height: 100%;
    }

    /* Icon Buttons */
    .icon-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
    }
    .icon-btn:hover { background: #222; color: var(--text); }
    .icon-btn.accent { border-color: var(--accent); color: var(--accent); }
    .icon-btn.red { border-color: var(--red); color: var(--red); }

    /* Stats Row */
    .stats-row {
      height: 28px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .stat { color: var(--text-muted); }
    .stat-value { color: var(--text); }

    /* Search Row */
    .search-row {
      height: 44px;
      padding: 6px 10px 6px 18px;
    }
    .search-row input {
      flex: 1;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--text-muted); }

    /* Column Headers */
    .column-headers {
      display: flex;
      height: var(--row-height);
      border-bottom: 2px solid var(--border);
      background: var(--bg);
    }
    .col-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding: 0 10px 0 8px;
      border-right: 2px solid var(--border);
      font-family: 'Helvetica Neue', -apple-system, system-ui, sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .col-header:last-child { border-right: none; }
    .col-artist { width: 200px; }
    .col-track { flex: 1; }
    .col-label { width: 150px; }

    /* Results List */
    .results-list {
      max-height: calc(100vh - 280px);
      overflow-y: auto;
    }
    .result-row {
      display: flex;
      height: var(--row-height);
      border-bottom: 2px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .result-row:hover { background: #111; }
    .result-row:hover .result-cell { border-color: var(--red); }
    .result-cell {
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 10px 0 8px;
      border-right: 2px solid var(--border);
      font-family: 'Helvetica Neue', -apple-system, system-ui, sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-cell:last-child { border-right: none; }
    .result-cell.artist { width: 200px; color: var(--text); }
    .result-cell.track { flex: 1; color: var(--text); }
    .result-cell.label { width: 150px; color: var(--text-muted); }

    /* Now Playing */
    .now-playing-row {
      background: #0a0a0a;
      border-bottom: 2px solid var(--red);
      border-top: 2px solid var(--red);
      border-left: none;
      border-right: none;
      border-radius: 0;
      margin: 0;
    }
    .now-playing-row .result-cell.artist { color: var(--red); }
    .now-playing-row .result-cell:first-child { border-left: 2px solid var(--red); }
    .now-playing-row .result-cell:last-child { border-right: 2px solid var(--red); }

    /* URL Row */
    .url-row {
      height: var(--row-height);
      font-size: 13px;
    }
    .url-label {
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      margin-right: 10px;
    }
    .url-value {
      flex: 1;
      color: var(--red);
      font-family: monospace;
      font-size: 12px;
    }
    .copy-btn {
      height: 24px;
      padding: 0 12px;
      border: 1px solid var(--red);
      background: var(--bg);
      color: var(--red);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
    }
    .copy-btn:hover { background: var(--red); color: var(--text); }

    /* Tabs */
    .tabs-row {
      display: flex;
      height: var(--row-height);
      border-bottom: 2px solid var(--border);
    }
    .tab {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 15px;
      height: 100%;
      border: none;
      border-right: 2px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      cursor: pointer;
      background: var(--bg);
    }
    .tab:first-child { border-left: none; }
    .tab:hover { background: #111; color: var(--text); }
    .tab.active { background: var(--red); color: var(--text); }
    .tab-spacer { flex: 1; }
    .tab-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      font-size: 11px;
      color: var(--text-muted);
      border-left: 2px solid var(--border);
      height: 100%;
    }
    .tab-info .icon-btn {
      width: 24px;
      height: 24px;
      min-width: 24px;
      min-height: 24px;
      font-size: 14px;
    }

    /* Dropdown */
    .dropdown {
      position: relative;
      height: 100%;
    }
    .dropdown-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 15px;
      height: 100%;
      border: none;
      border-right: 2px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .dropdown-btn:hover { background: #111; color: var(--text); }
    .dropdown-arrow { font-size: 8px; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 160px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-top: none;
      z-index: 100;
    }
    .dropdown-menu.active { display: block; }
    .dropdown-item {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: none;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      border-bottom: 2px solid var(--border);
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #222; color: var(--red); }

    /* Tab Content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Settings Tab */
    .settings-section {
      padding: 15px;
      border-bottom: 2px solid var(--border);
    }
    .settings-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .setting-group label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .setting-group select,
    .setting-group input[type="number"],
    .setting-group input[type="text"] {
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .setting-group select:focus,
    .setting-group input:focus { outline: none; border-color: var(--accent); }
    .setting-group input[type="color"] {
      height: 32px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      cursor: pointer;
    }
    .setting-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 32px;
    }
    .checkbox-row label {
      text-transform: none;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    /* Preview */
    .preview-container {
      padding: 15px;
      border-bottom: 2px solid var(--border);
    }
    .preview-wrapper {
      transform: scale(0.5);
      transform-origin: top left;
      width: 200%;
    }
    .preview-box {
      background: #000;
      padding: 12px;
    }
    .preview-line { font-size: 48px; font-weight: 700; color: #fff; line-height: 1.2; }

    @keyframes pulseGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    /* Action Buttons Row */
    .action-row {
      display: flex;
      gap: 10px;
      padding: 15px;
    }
    .action-btn {
      height: 32px;
      padding: 0 16px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
    }
    .action-btn:hover { background: #222; }
    .action-btn.red { border-color: var(--red); color: var(--red); }
    .action-btn.red:hover { background: var(--red); color: var(--text); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg);
      border: 2px solid var(--border);
      width: 100%;
      max-width: 380px;
      margin: 20px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--row-height);
      padding: 0 10px;
      border-bottom: 2px solid var(--border);
    }
    .modal-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
      text-transform: uppercase;
    }
    .modal-body { padding: 15px; }
    .modal-body .setting-group { margin-bottom: 12px; }
    .modal-body .setting-group:last-of-type { margin-bottom: 0; }
    .modal-actions { padding: 0 15px 15px; }
    .modal-btn {
      width: 100%;
      height: 36px;
      border: 1px solid var(--red);
      background: var(--red);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
    }
    .modal-btn:hover { background: #e02f2f; }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state-text {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- Header Bar -->
  <div class="header-bar">
    <div class="header-title"><span class="accent">Now Playing</span> Control</div>
    <div class="header-buttons">
      <button class="icon-btn red" id="closeWindow" title="Close">✕</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-row">
    <div class="tab active" data-tab="search">Search</div>
    <div class="tab" data-tab="settings">Settings</div>
    <div class="dropdown">
      <button class="dropdown-btn" id="overlayDropdownBtn">Overlay <span class="dropdown-arrow">▼</span></button>
      <div class="dropdown-menu" id="overlayDropdownMenu">
        <button class="dropdown-item" id="openOverlayBrowser">Open in Browser</button>
        <button class="dropdown-item" id="copyOverlayUrl">Copy URL</button>
      </div>
    </div>
    <div class="tab-spacer"></div>
    <div class="tab-info">
      <span id="rbCount">Loading...</span>
      <button class="icon-btn" id="reload" title="Reload XML">↻</button>
    </div>
  </div>

  <!-- Search Tab -->
  <div id="tab-search" class="tab-content active">
    <!-- URL Row -->
    <div class="grid-row url-row">
      <span class="url-label">OBS URL:</span>
      <span class="url-value" id="overlayUrlMain">http://localhost:5050/overlay</span>
      <button class="copy-btn" id="copyUrlMain">Copy</button>
    </div>

    <!-- Section Header -->
    <div class="grid-row section-header">
      <span class="section-title">Search Library:</span>
      <div class="section-actions">
        <button class="icon-btn accent" id="addManual" title="Manual Entry">+</button>
        <button class="icon-btn red" id="clear" title="Clear Overlay">✕</button>
      </div>
    </div>

    <!-- Search Row -->
    <div class="grid-row search-row">
      <input type="search" id="q" placeholder="Search artist, track, label..." autocomplete="off" />
    </div>

    <!-- Stats Row -->
    <div class="grid-row stats-row">
      <span class="stat">Status: <span class="stat-value" id="status">Ready</span></span>
    </div>

    <!-- Now Playing -->
    <div class="result-row now-playing-row" id="nowPlaying" style="display: none;">
      <div class="result-cell artist" id="npArtist"></div>
      <div class="result-cell track" id="npTrack"></div>
      <div class="result-cell label" id="npLabel"></div>
    </div>

    <!-- Column Headers -->
    <div class="column-headers">
      <div class="col-header col-artist">Artist:</div>
      <div class="col-header col-track">Track:</div>
      <div class="col-header col-label">Label:</div>
    </div>

    <!-- Results List -->
    <div class="results-list" id="results"></div>
  </div>

  <!-- Settings Tab -->
  <div id="tab-settings" class="tab-content">
    <!-- Preview -->
    <div class="preview-container" id="previewContainer">
      <div class="preview-wrapper">
        <div class="preview-box" id="previewBox">
          <div class="preview-line" id="previewArtist">Artist Name</div>
          <div class="preview-line" id="previewTrack">Track Title</div>
          <div class="preview-line" id="previewLabel">[Label Name]</div>
        </div>
      </div>
    </div>

    <!-- URL -->
    <div class="settings-section">
      <div class="settings-title">Browser Source URL</div>
      <div class="grid-row url-row" style="border: 1px solid var(--border); height: 35px;">
        <span class="url-value" id="overlayUrl">http://localhost:5050/overlay</span>
        <button class="copy-btn" id="copyUrl">Copy</button>
      </div>
    </div>

    <!-- Font Settings -->
    <div class="settings-section">
      <div class="settings-title">Font Settings</div>
      <div class="settings-grid">
        <div class="setting-group">
          <label>Font Family</label>
          <select id="fontFamily">
            <option value="Impact, Haettenschweiler, Arial Narrow Bold, sans-serif">Impact</option>
            <option value="Helvetica Neue, Helvetica, Arial, sans-serif">Helvetica Neue</option>
            <option value="HelveticaNeue-Bold, Helvetica Neue, Helvetica, Arial, sans-serif">Helvetica Neue Bold</option>
            <option value="Inter, -apple-system, system-ui, sans-serif">Inter</option>
            <option value="Roboto, -apple-system, system-ui, sans-serif">Roboto</option>
            <option value="Open Sans, -apple-system, system-ui, sans-serif">Open Sans</option>
            <option value="Montserrat, -apple-system, system-ui, sans-serif">Montserrat</option>
            <option value="Poppins, -apple-system, system-ui, sans-serif">Poppins</option>
            <option value="-apple-system, system-ui, sans-serif">System Default</option>
            <option value="Georgia, serif">Georgia (Serif)</option>
            <option value="monospace">Monospace</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Font Weight</label>
          <select id="fontWeight">
            <option value="100">100 - Thin</option>
            <option value="200">200 - Extra Light</option>
            <option value="300">300 - Light</option>
            <option value="400">400 - Normal</option>
            <option value="500">500 - Medium</option>
            <option value="600">600 - Semi Bold</option>
            <option value="700">700 - Bold</option>
            <option value="800">800 - Extra Bold</option>
            <option value="900">900 - Black</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Artist Size (px)</label>
          <input type="number" id="artistSize" min="16" max="120" value="48" />
        </div>
        <div class="setting-group">
          <label>Artist Color</label>
          <input type="color" id="artistColor" value="#ffffff" />
        </div>
        <div class="setting-group">
          <label>Track Size (px)</label>
          <input type="number" id="trackSize" min="16" max="120" value="40" />
        </div>
        <div class="setting-group">
          <label>Track Color</label>
          <input type="color" id="trackColor" value="#ffffff" />
        </div>
        <div class="setting-group">
          <label>Label Size (px)</label>
          <input type="number" id="labelSize" min="12" max="80" value="32" />
        </div>
        <div class="setting-group">
          <label>Label Color</label>
          <input type="color" id="labelColor" value="#ffffff" />
        </div>
        <div class="setting-group">
          <label>Text Align</label>
          <select id="textAlign">
            <option value="left">Left</option>
            <option value="center">Center</option>
            <option value="right">Right</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Padding (px)</label>
          <input type="number" id="padding" min="0" max="100" value="20" />
        </div>
        <div class="setting-group">
          <label>Line Spacing (px)</label>
          <input type="number" id="lineSpacing" min="0" max="50" value="4" />
        </div>
        <div class="setting-group">
          <div class="checkbox-row">
            <input type="checkbox" id="showLabel" checked />
            <label for="showLabel">Show Label</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Outline & Shadow -->
    <div class="settings-section">
      <div class="settings-title">Outline & Shadow</div>
      <div class="settings-grid">
        <div class="setting-group">
          <div class="checkbox-row">
            <input type="checkbox" id="textStroke" checked />
            <label for="textStroke">Text Outline</label>
          </div>
        </div>
        <div class="setting-group">
          <label>Outline Color</label>
          <input type="color" id="strokeColor" value="#000000" />
        </div>
        <div class="setting-group">
          <label>Outline Width (px)</label>
          <input type="number" id="strokeWidth" min="0" max="10" value="2" />
        </div>
        <div class="setting-group">
          <label>Outline Position</label>
          <select id="strokePosition">
            <option value="outside">Outside</option>
            <option value="inside">Inside</option>
          </select>
        </div>
        <div class="setting-group">
          <div class="checkbox-row">
            <input type="checkbox" id="textShadow" checked />
            <label for="textShadow">Drop Shadow</label>
          </div>
        </div>
        <div class="setting-group">
          <label>Shadow Color</label>
          <input type="color" id="shadowColor" value="#ff0000" />
        </div>
        <div class="setting-group">
          <label>Shadow X Offset</label>
          <input type="number" id="shadowOffsetX" min="-20" max="20" value="2" />
        </div>
        <div class="setting-group">
          <label>Shadow Y Offset</label>
          <input type="number" id="shadowOffsetY" min="-20" max="20" value="3" />
        </div>
        <div class="setting-group">
          <label>Shadow Blur (px)</label>
          <input type="number" id="shadowBlur" min="0" max="20" value="0" />
        </div>
        <div class="setting-group">
          <div class="checkbox-row">
            <input type="checkbox" id="shadow2Enabled" />
            <label for="shadow2Enabled">Drop Shadow 2</label>
          </div>
        </div>
        <div class="setting-group">
          <label>Shadow 2 Color</label>
          <input type="color" id="shadow2Color" value="#000000" />
        </div>
        <div class="setting-group">
          <label>Shadow 2 X Offset</label>
          <input type="number" id="shadow2OffsetX" min="-20" max="20" value="4" />
        </div>
        <div class="setting-group">
          <label>Shadow 2 Y Offset</label>
          <input type="number" id="shadow2OffsetY" min="-20" max="20" value="6" />
        </div>
        <div class="setting-group">
          <label>Shadow 2 Blur (px)</label>
          <input type="number" id="shadow2Blur" min="0" max="20" value="0" />
        </div>
      </div>
    </div>

    <!-- Glow & Animation -->
    <div class="settings-section">
      <div class="settings-title">Glow & Animation</div>
      <div class="settings-grid">
        <div class="setting-group">
          <div class="checkbox-row">
            <input type="checkbox" id="glowEnabled" />
            <label for="glowEnabled">Enable Glow</label>
          </div>
        </div>
        <div class="setting-group">
          <label>Glow Color</label>
          <input type="color" id="glowColor" value="#ff0000" />
        </div>
        <div class="setting-group">
          <label>Glow Size (px)</label>
          <input type="number" id="glowSize" min="0" max="50" value="18" />
        </div>
        <div class="setting-group">
          <div class="checkbox-row">
            <input type="checkbox" id="pulseEnabled" />
            <label for="pulseEnabled">Enable Pulse</label>
          </div>
        </div>
        <div class="setting-group">
          <label>Pulse Speed (sec)</label>
          <input type="number" id="pulseSpeed" min="0.5" max="10" step="0.5" value="2.5" />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="action-btn red" id="saveSettings">Save Settings</button>
      <button class="action-btn" id="resetSettings">Reset to Defaults</button>
    </div>
  </div>

  <!-- Manual Entry Modal -->
  <div class="modal-overlay" id="manualModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Manual Entry</span>
        <button class="icon-btn red" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label>Artist</label>
          <input type="text" id="manualArtist" placeholder="Artist name" />
        </div>
        <div class="setting-group">
          <label>Track</label>
          <input type="text" id="manualTrack" placeholder="Track title" />
        </div>
        <div class="setting-group">
          <label>Label</label>
          <input type="text" id="manualLabel" placeholder="Label (optional)" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn" id="manualUpdate">Update Overlay</button>
      </div>
    </div>
  </div>

<script>
  const $q = document.getElementById("q");
  const $status = document.getElementById("status");
  const $results = document.getElementById("results");
  const $rbCount = document.getElementById("rbCount");

  // Settings elements
  const settingsInputs = {
    fontFamily: document.getElementById("fontFamily"),
    fontWeight: document.getElementById("fontWeight"),
    artistSize: document.getElementById("artistSize"),
    artistColor: document.getElementById("artistColor"),
    trackSize: document.getElementById("trackSize"),
    trackColor: document.getElementById("trackColor"),
    labelSize: document.getElementById("labelSize"),
    labelColor: document.getElementById("labelColor"),
    textAlign: document.getElementById("textAlign"),
    padding: document.getElementById("padding"),
    lineSpacing: document.getElementById("lineSpacing"),
    showLabel: document.getElementById("showLabel"),
    textStroke: document.getElementById("textStroke"),
    strokeColor: document.getElementById("strokeColor"),
    strokeWidth: document.getElementById("strokeWidth"),
    strokePosition: document.getElementById("strokePosition"),
    textShadow: document.getElementById("textShadow"),
    shadowColor: document.getElementById("shadowColor"),
    shadowOffsetX: document.getElementById("shadowOffsetX"),
    shadowOffsetY: document.getElementById("shadowOffsetY"),
    shadowBlur: document.getElementById("shadowBlur"),
    shadow2Enabled: document.getElementById("shadow2Enabled"),
    shadow2Color: document.getElementById("shadow2Color"),
    shadow2OffsetX: document.getElementById("shadow2OffsetX"),
    shadow2OffsetY: document.getElementById("shadow2OffsetY"),
    shadow2Blur: document.getElementById("shadow2Blur"),
    glowEnabled: document.getElementById("glowEnabled"),
    glowColor: document.getElementById("glowColor"),
    glowSize: document.getElementById("glowSize"),
    pulseEnabled: document.getElementById("pulseEnabled"),
    pulseSpeed: document.getElementById("pulseSpeed"),
  };

  // Preview elements
  const $previewBox = document.getElementById("previewBox");
  const $previewArtist = document.getElementById("previewArtist");
  const $previewTrack = document.getElementById("previewTrack");
  const $previewLabel = document.getElementById("previewLabel");

  let currentSettings = {};
  let debounce = null;
  let settingsDebounce = null;

  // Tabs
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add("active");
    });
  });

  async function getJSON(url) {
    const res = await fetch(url);
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.error || "Request failed");
    return json;
  }

  async function postJSON(url, body) {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.error || "Request failed");
    return json;
  }

  function renderResults(items) {
    $results.innerHTML = "";
    if (!items || !items.length) {
      $results.innerHTML = '<div class="empty-state"><span class="empty-state-text">No results</span></div>';
      return;
    }

    for (const it of items) {
      const div = document.createElement("div");
      div.className = "result-row";

      let labelRaw = (it.label || "").trim();
      if (labelRaw.startsWith("[") && labelRaw.endsWith("]")) {
        labelRaw = labelRaw.slice(1, -1).trim();
      }
      const labelText = labelRaw || "Unreleased";

      div.innerHTML = `
        <div class="result-cell artist">${escapeHtml(it.artist || "")}</div>
        <div class="result-cell track">${escapeHtml(it.title || "")}</div>
        <div class="result-cell label">[${escapeHtml(labelText)}]</div>
      `;

      div.addEventListener("click", async () => {
        $status.textContent = "Updating...";
        try {
          await postJSON("/api/set", { artist: it.artist, title: it.title, label: it.label });
          $status.textContent = "Now Playing";
          updatePreview({ artist: it.artist, title: it.title, label: it.label });
          $q.value = "";
          $results.innerHTML = "";
          showNowPlaying({ artist: it.artist, title: it.title, label: it.label });
        } catch (e) {
          $status.textContent = `Error: ${e.message}`;
        }
      });

      $results.appendChild(div);
    }
  }

  function escapeHtml(s) {
    return (s ?? "").toString().replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function showNowPlaying(track) {
    const $nowPlaying = document.getElementById("nowPlaying");
    const $npArtist = document.getElementById("npArtist");
    const $npTrack = document.getElementById("npTrack");
    const $npLabel = document.getElementById("npLabel");

    if (!track || (!track.artist && !track.title)) {
      $nowPlaying.style.display = "none";
      return;
    }

    let labelText = (track.label || "").trim();
    if (labelText.startsWith("[") && labelText.endsWith("]")) {
      labelText = labelText.slice(1, -1).trim();
    }

    $npArtist.textContent = track.artist || "";
    $npTrack.textContent = track.title || "";
    $npLabel.textContent = labelText ? `[${labelText}]` : "[Unreleased]";
    $nowPlaying.style.display = "flex";
  }

  async function refreshStatus() {
    try {
      const s = await getJSON("/api/status");
      $rbCount.textContent = `${s.rb.count} tracks`;
      document.getElementById("overlayUrl").textContent = s.overlayUrl;
      document.getElementById("overlayUrlMain").textContent = s.overlayUrl;
      if (s.track && (s.track.artist || s.track.title)) {
        updatePreview(s.track);
        showNowPlaying(s.track);
        $status.textContent = "Now Playing";
      }
    } catch (e) {
      $status.textContent = `Error: ${e.message}`;
    }
  }

  async function search(q) {
    const query = (q || "").trim();
    if (!query) {
      $results.innerHTML = '<div class="empty-state"><span class="empty-state-text">Type to search</span></div>';
      $status.textContent = "Ready";
      return;
    }

    try {
      $status.textContent = "Searching...";
      const r = await getJSON(`/api/search?q=${encodeURIComponent(query)}`);
      renderResults(r.results || []);
      $status.textContent = (r.results && r.results.length)
        ? `${r.results.length} matches`
        : "No matches";
    } catch (e) {
      $status.textContent = `Error: ${e.message}`;
    }
  }

  $q.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => search($q.value), 120);
  });

  document.getElementById("reload").addEventListener("click", async () => {
    $status.textContent = "Reloading...";
    try {
      const r = await postJSON("/api/reload-library");
      $rbCount.textContent = `${r.count} tracks`;
      $status.textContent = `Reloaded: ${r.count}`;
      if ($q.value.trim()) search($q.value);
    } catch (e) {
      $status.textContent = `Error: ${e.message}`;
    }
  });

  document.getElementById("clear").addEventListener("click", async () => {
    $status.textContent = "Clearing...";
    try {
      await postJSON("/api/clear");
      $status.textContent = "Ready";
      updatePreview({ artist: "", title: "", label: "" });
      showNowPlaying(null);
    } catch (e) {
      $status.textContent = `Error: ${e.message}`;
    }
  });

  // Manual Entry Modal
  const $modal = document.getElementById("manualModal");

  document.getElementById("addManual").addEventListener("click", () => {
    $modal.classList.add("active");
    document.getElementById("manualArtist").focus();
  });

  document.getElementById("modalClose").addEventListener("click", () => {
    $modal.classList.remove("active");
  });

  $modal.addEventListener("click", (e) => {
    if (e.target === $modal) {
      $modal.classList.remove("active");
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && $modal.classList.contains("active")) {
      $modal.classList.remove("active");
    }
  });

  document.getElementById("manualUpdate").addEventListener("click", async () => {
    const artist = document.getElementById("manualArtist").value.trim();
    const title = document.getElementById("manualTrack").value.trim();
    const label = document.getElementById("manualLabel").value.trim();

    if (!artist && !title) {
      $status.textContent = "Enter artist or track";
      return;
    }

    $status.textContent = "Updating...";
    try {
      await postJSON("/api/set", { artist, title, label });
      $status.textContent = "Now Playing";
      updatePreview({ artist, title, label });
      showNowPlaying({ artist, title, label });
      document.getElementById("manualArtist").value = "";
      document.getElementById("manualTrack").value = "";
      document.getElementById("manualLabel").value = "";
      $q.value = "";
      $results.innerHTML = "";
      $modal.classList.remove("active");
    } catch (e) {
      $status.textContent = `Error: ${e.message}`;
    }
  });

  // Copy URL buttons
  document.getElementById("copyUrl").addEventListener("click", () => {
    const url = document.getElementById("overlayUrl").textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById("copyUrl");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 1500);
    });
  });

  document.getElementById("copyUrlMain").addEventListener("click", () => {
    const url = document.getElementById("overlayUrlMain").textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById("copyUrlMain");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 1500);
    });
  });

  // Settings functions
  async function loadSettings() {
    try {
      const r = await getJSON("/api/settings");
      currentSettings = r.settings;
      applySettingsToInputs(currentSettings);
      applySettingsToPreview(currentSettings);
    } catch (e) {
      console.error("Failed to load settings:", e);
    }
  }

  function applySettingsToInputs(s) {
    settingsInputs.fontFamily.value = s.fontFamily || "Impact, Haettenschweiler, Arial Narrow Bold, sans-serif";
    settingsInputs.fontWeight.value = s.fontWeight || 700;
    settingsInputs.artistSize.value = s.artistSize || 48;
    settingsInputs.artistColor.value = s.artistColor || "#ffffff";
    settingsInputs.trackSize.value = s.trackSize || 40;
    settingsInputs.trackColor.value = s.trackColor || "#ffffff";
    settingsInputs.labelSize.value = s.labelSize || 32;
    settingsInputs.labelColor.value = s.labelColor || "#ffffff";
    settingsInputs.textAlign.value = s.textAlign || "left";
    settingsInputs.padding.value = s.padding || 20;
    settingsInputs.lineSpacing.value = s.lineSpacing || 4;
    settingsInputs.showLabel.checked = s.showLabel !== false;
    settingsInputs.textStroke.checked = s.textStroke !== false;
    settingsInputs.strokeColor.value = s.strokeColor || "#000000";
    settingsInputs.strokeWidth.value = s.strokeWidth || 2;
    settingsInputs.strokePosition.value = s.strokePosition || "outside";
    settingsInputs.textShadow.checked = s.textShadow !== false;
    settingsInputs.shadowColor.value = s.shadowColor || "#ff0000";
    settingsInputs.shadowOffsetX.value = s.shadowOffsetX || 2;
    settingsInputs.shadowOffsetY.value = s.shadowOffsetY || 3;
    settingsInputs.shadowBlur.value = s.shadowBlur || 0;
    settingsInputs.shadow2Enabled.checked = s.shadow2Enabled === true;
    settingsInputs.shadow2Color.value = s.shadow2Color || "#000000";
    settingsInputs.shadow2OffsetX.value = s.shadow2OffsetX || 4;
    settingsInputs.shadow2OffsetY.value = s.shadow2OffsetY || 6;
    settingsInputs.shadow2Blur.value = s.shadow2Blur || 0;
    settingsInputs.glowEnabled.checked = s.glowEnabled === true;
    settingsInputs.glowColor.value = s.glowColor || "#ff0000";
    settingsInputs.glowSize.value = s.glowSize || 18;
    settingsInputs.pulseEnabled.checked = s.pulseEnabled === true;
    settingsInputs.pulseSpeed.value = s.pulseSpeed || 2.5;
  }

  function applySettingsToPreview(s) {
    const font = s.fontFamily || "Impact, Haettenschweiler, Arial Narrow Bold, sans-serif";
    const lineSpacing = s.lineSpacing || 4;
    const fontWeight = s.fontWeight || 700;

    $previewBox.style.padding = `${s.padding || 20}px`;
    $previewBox.style.textAlign = s.textAlign || "left";

    $previewArtist.style.fontFamily = font;
    $previewArtist.style.fontSize = `${s.artistSize || 48}px`;
    $previewArtist.style.color = s.artistColor || "#ffffff";
    $previewArtist.style.fontWeight = fontWeight;

    $previewTrack.style.fontFamily = font;
    $previewTrack.style.fontSize = `${s.trackSize || 40}px`;
    $previewTrack.style.color = s.trackColor || "#ffffff";
    $previewTrack.style.marginTop = `${lineSpacing}px`;
    $previewTrack.style.fontWeight = fontWeight;

    $previewLabel.style.fontFamily = font;
    $previewLabel.style.fontSize = `${s.labelSize || 32}px`;
    $previewLabel.style.color = s.labelColor || "#ffffff";
    $previewLabel.style.marginTop = `${lineSpacing}px`;
    $previewLabel.style.fontWeight = fontWeight;

    const textLines = [$previewArtist, $previewTrack, $previewLabel];
    textLines.forEach((el) => {
      if (s.textStroke !== false) {
        el.style.webkitTextStroke = `${s.strokeWidth || 2}px ${s.strokeColor || "#000000"}`;
        el.style.paintOrder = s.strokePosition === "inside" ? "fill stroke" : "stroke fill";
      } else {
        el.style.webkitTextStroke = "none";
      }

      const shadows = [];
      if (s.glowEnabled) {
        const glowColor = s.glowColor || "#ff0000";
        const glowSize = s.glowSize || 18;
        shadows.push(`0px 0px ${glowSize}px ${glowColor}`);
        shadows.push(`0px 0px ${glowSize * 1.5}px ${glowColor}`);
      }
      if (s.textShadow !== false) {
        shadows.push(`${s.shadowOffsetX || 2}px ${s.shadowOffsetY || 3}px ${s.shadowBlur || 0}px ${s.shadowColor || "#ff0000"}`);
      }
      if (s.shadow2Enabled) {
        shadows.push(`${s.shadow2OffsetX || 4}px ${s.shadow2OffsetY || 6}px ${s.shadow2Blur || 0}px ${s.shadow2Color || "#000000"}`);
      }
      el.style.textShadow = shadows.length ? shadows.join(", ") : "none";

      if (s.pulseEnabled) {
        el.style.animation = `pulseGlow ${s.pulseSpeed || 2.5}s ease-in-out infinite`;
      } else {
        el.style.animation = "none";
      }
    });

    $previewLabel.style.display = s.showLabel === false ? "none" : "block";

    requestAnimationFrame(() => {
      const box = document.getElementById("previewBox");
      const container = document.getElementById("previewContainer");
      if (box && container) {
        container.style.height = (box.offsetHeight * 0.5 + 30) + "px";
      }
    });
  }

  function getSettingsFromInputs() {
    return {
      fontFamily: settingsInputs.fontFamily.value,
      fontWeight: parseInt(settingsInputs.fontWeight.value) || 700,
      artistSize: parseInt(settingsInputs.artistSize.value) || 48,
      artistColor: settingsInputs.artistColor.value,
      trackSize: parseInt(settingsInputs.trackSize.value) || 40,
      trackColor: settingsInputs.trackColor.value,
      labelSize: parseInt(settingsInputs.labelSize.value) || 32,
      labelColor: settingsInputs.labelColor.value,
      textAlign: settingsInputs.textAlign.value,
      padding: parseInt(settingsInputs.padding.value) || 20,
      lineSpacing: parseInt(settingsInputs.lineSpacing.value) || 4,
      showLabel: settingsInputs.showLabel.checked,
      textStroke: settingsInputs.textStroke.checked,
      strokeColor: settingsInputs.strokeColor.value,
      strokeWidth: parseInt(settingsInputs.strokeWidth.value) || 2,
      strokePosition: settingsInputs.strokePosition.value,
      textShadow: settingsInputs.textShadow.checked,
      shadowColor: settingsInputs.shadowColor.value,
      shadowOffsetX: parseInt(settingsInputs.shadowOffsetX.value) || 2,
      shadowOffsetY: parseInt(settingsInputs.shadowOffsetY.value) || 3,
      shadowBlur: parseInt(settingsInputs.shadowBlur.value) || 0,
      shadow2Enabled: settingsInputs.shadow2Enabled.checked,
      shadow2Color: settingsInputs.shadow2Color.value,
      shadow2OffsetX: parseInt(settingsInputs.shadow2OffsetX.value) || 4,
      shadow2OffsetY: parseInt(settingsInputs.shadow2OffsetY.value) || 6,
      shadow2Blur: parseInt(settingsInputs.shadow2Blur.value) || 0,
      glowEnabled: settingsInputs.glowEnabled.checked,
      glowColor: settingsInputs.glowColor.value,
      glowSize: parseInt(settingsInputs.glowSize.value) || 18,
      pulseEnabled: settingsInputs.pulseEnabled.checked,
      pulseSpeed: parseFloat(settingsInputs.pulseSpeed.value) || 2.5,
    };
  }

  async function saveSettings() {
    const settings = getSettingsFromInputs();
    currentSettings = settings;
    applySettingsToPreview(settings);
    try {
      await postJSON("/api/settings", settings);
    } catch (e) {
      console.error("Failed to save settings:", e);
    }
  }

  Object.values(settingsInputs).forEach(input => {
    input.addEventListener("input", () => {
      clearTimeout(settingsDebounce);
      settingsDebounce = setTimeout(saveSettings, 200);
    });
    input.addEventListener("change", () => {
      clearTimeout(settingsDebounce);
      saveSettings();
    });
  });

  document.getElementById("saveSettings").addEventListener("click", async () => {
    const btn = document.getElementById("saveSettings");
    btn.textContent = "Saving...";
    try {
      await saveSettings();
      btn.textContent = "Saved!";
      setTimeout(() => { btn.textContent = "Save Settings"; }, 1500);
    } catch (e) {
      btn.textContent = "Error!";
      setTimeout(() => { btn.textContent = "Save Settings"; }, 1500);
    }
  });

  document.getElementById("resetSettings").addEventListener("click", async () => {
    try {
      const r = await postJSON("/api/settings/reset");
      currentSettings = r.settings;
      applySettingsToInputs(currentSettings);
      applySettingsToPreview(currentSettings);
    } catch (e) {
      console.error("Failed to reset settings:", e);
    }
  });

  let currentTrack = { artist: "", title: "", label: "" };

  function updatePreview(track) {
    currentTrack = track || currentTrack;
    $previewArtist.textContent = currentTrack.artist || "Artist Name";
    $previewTrack.textContent = currentTrack.title || "Track Title";
    let labelText = (currentTrack.label || "").trim();
    if (labelText.startsWith("[") && labelText.endsWith("]")) {
      labelText = labelText.slice(1, -1).trim();
    }
    $previewLabel.textContent = labelText ? `[${labelText}]` : "[Label Name]";
  }

  // Close window button
  document.getElementById("closeWindow").addEventListener("click", () => {
    if (window.electronAPI) {
      window.electronAPI.closeWindow();
    } else {
      window.close();
    }
  });

  // Overlay dropdown
  const $dropdownBtn = document.getElementById("overlayDropdownBtn");
  const $dropdownMenu = document.getElementById("overlayDropdownMenu");

  $dropdownBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    $dropdownMenu.classList.toggle("active");
  });

  document.addEventListener("click", () => {
    $dropdownMenu.classList.remove("active");
  });

  document.getElementById("openOverlayBrowser").addEventListener("click", () => {
    const url = document.getElementById("overlayUrlMain").textContent;
    window.open(url, "_blank");
    $dropdownMenu.classList.remove("active");
  });

  document.getElementById("copyOverlayUrl").addEventListener("click", () => {
    const url = document.getElementById("overlayUrlMain").textContent;
    navigator.clipboard.writeText(url).then(() => {
      $dropdownBtn.textContent = "Copied!";
      setTimeout(() => {
        $dropdownBtn.innerHTML = 'Overlay <span class="dropdown-arrow">▼</span>';
      }, 1500);
    });
    $dropdownMenu.classList.remove("active");
  });

  refreshStatus();
  loadSettings();
  $q.focus();
</script>
</body>
</html>
